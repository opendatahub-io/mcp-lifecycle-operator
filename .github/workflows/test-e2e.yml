# Generated from kubebuilder template:
# https://github.com/kubernetes-sigs/kubebuilder/blob/v4.11.1/pkg/plugins/golang/v4/scaffolds/internal/templates/github/test-e2e.go

name: E2E Tests

on:
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          KIND_VERSION=v0.32.0
          KIND_BINARY="kind-linux-$(go env GOARCH)"
          curl -Lo "./${KIND_BINARY}" "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/${KIND_BINARY}"
          curl -Lo "./${KIND_BINARY}.sha256sum" "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/${KIND_BINARY}.sha256sum"
          sha256sum -c "./${KIND_BINARY}.sha256sum"
          chmod +x "./${KIND_BINARY}"
          sudo mv "./${KIND_BINARY}" /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Deploy operator to Kind cluster
        run: make deploy-test-e2e

      - name: Run e2e tests
        run: make test-e2e
